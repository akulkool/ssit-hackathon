# Render Blueprint — deploy FastAPI API
# https://render.com/docs/blueprint-spec
#
# After deploy, set VITE_API_BASE_URL on Vercel to your Render service URL.

services:
  - type: web
    name: finsight-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
